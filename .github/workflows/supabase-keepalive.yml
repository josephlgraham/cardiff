# Keeps the Supabase free-tier database from going idle by doing a real table
# read every 4 days. Supabase tracks database activity, not HTTP pings, so we
# must hit an actual PostgREST table endpoint.
#
# If this starts 401ing again, the first thing to check is whether
# SUPABASE_ANON_KEY in GitHub repo secrets matches the current anon key shown
# in the Supabase dashboard (Project Settings → API). Keys can be rotated.
name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */4 * *'  # Every 4 days at 12:00 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read reactions table to keep database alive
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/reactions?select=id&limit=1")
          echo "HTTP status: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Unexpected response: $response — check SUPABASE_ANON_KEY secret matches Supabase dashboard"
            exit 1
          fi
          echo "Supabase database read succeeded."
