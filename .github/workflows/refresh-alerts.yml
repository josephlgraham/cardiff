name: Refresh Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh alert ticker
        run: node cardiff-alerts.js

      - name: Commit alert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ticker.json
          if git diff --cached --quiet; then
            echo "No alert changes to commit."
            exit 0
          fi
          git commit -m "data: alerts refresh"
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected; rebasing onto latest main (attempt $attempt)."
            git fetch origin main
            # Replayed (our) commit wins on conflict: these files are regenerated, so freshest data is correct.
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 4 + 2))
          done
          echo "Failed to push alert data after 5 attempts." >&2
          exit 1
