name: Refresh Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh weather and news files
        run: node scripts/fetch-site-data.mjs
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          WEATHER_STATION_ID: KALGRAYS4

      - name: Refresh alert ticker
        run: node cardiff-alerts.js

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add cardiff-weather.json cardiff-news-live.json ticker.json
            git commit -m "Refresh site data"
            git push
          else
            echo "No data changes to commit."
          fi
