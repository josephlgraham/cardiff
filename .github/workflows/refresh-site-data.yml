name: Refresh Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,17 * * *'

permissions:
  contents: write

concurrency:
  group: data-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh weather, watershed, civic snapshot, and news files
        run: node scripts/fetch-site-data.mjs
        env:
          AW_API_KEY: ${{ secrets.AW_API_KEY }}
          AW_APP_KEY: ${{ secrets.AW_APP_KEY }}

      - name: Commit refreshed data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add cardiff-news-live.json cardiff-weather.json cardiff-watershed.json cardiff-air-quality.json cardiff-rain-log.json cardiff-weather-archive.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: daily refresh"
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected; rebasing onto latest main (attempt $attempt)."
            git fetch origin main
            # Replayed (our) commit wins on conflict: these files are regenerated, so freshest data is correct.
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 4 + 2))
          done
          echo "Failed to push refreshed data after 5 attempts." >&2
          exit 1
