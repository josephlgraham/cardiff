name: Refresh Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh weather, watershed, civic snapshot, and news files
        run: node scripts/fetch-site-data.mjs
        env:
          AW_API_KEY: ${{ secrets.AW_API_KEY }}
          AW_APP_KEY: ${{ secrets.AW_APP_SECRET }}

      - name: Refresh alert ticker
        run: node cardiff-alerts.js

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add cardiff-news-live.json ticker.json cardiff-weather.json cardiff-watershed.json cardiff-air-quality.json cardiff-rain-log.json cardiff-community-snapshot.json
            git commit -m "data: weather refresh"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit."
          fi
